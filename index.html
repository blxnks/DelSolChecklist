<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Del Sol Project Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; transition: all 0.3s ease; }
        .card:hover { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
        .checkbox-custom { width: 22px; height: 22px; border-radius: 6px; border: 2px solid #475569; appearance: none; cursor: pointer; position: relative; }
        .checkbox-custom:checked { background-color: #3b82f6; border-color: #3b82f6; }
        .checkbox-custom:checked::after { content: '✓'; position: absolute; color: white; font-size: 16px; top: -2px; left: 3px; }
        .strikethrough { text-decoration: line-through; opacity: 0.4; }
        .badge-critical { background: #ef4444; color: white; font-size: 0.65rem; padding: 1px 5px; border-radius: 4px; font-weight: bold; }
        #sync-status { transition: opacity 0.3s; }
        .loading-shimmer { background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <div class="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-4xl font-black text-blue-500 tracking-tighter">HONDA DEL SOL <span class="text-white">BUILD</span></h1>
                <div class="flex items-center gap-2 mt-1">
                    <span id="sync-status" class="flex items-center gap-1 text-xs text-slate-500">
                        <span class="w-2 h-2 rounded-full bg-green-500"></span> Live Sync Enabled
                    </span>
                </div>
            </div>
            <div class="text-right">
                <div class="text-sm text-slate-400 uppercase tracking-widest">Total Budget</div>
                <div class="text-3xl font-mono font-bold text-green-400" id="total-budget">$0.00</div>
            </div>
        </div>

        <div class="mb-8 card p-5 bg-slate-800/50">
            <div class="flex justify-between text-xs mb-2 uppercase font-bold tracking-wider">
                <span>Restoration Progress</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="w-full bg-slate-900 h-4 rounded-full overflow-hidden p-1">
                <div id="progress-bar" class="bg-blue-500 h-full rounded-full transition-all duration-700 shadow-[0_0_10px_rgba(59,130,246,0.5)]" style="width: 0%"></div>
            </div>
        </div>

        <div id="dashboard-content" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <section>
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-2 h-6 bg-red-500 rounded-full"></div>
                    <h2 class="text-xl font-bold uppercase tracking-tight">Engine</h2>
                </div>
                <div id="engine-items" class="space-y-3"></div>
            </section>

            <section>
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-2 h-6 bg-orange-500 rounded-full"></div>
                    <h2 class="text-xl font-bold uppercase tracking-tight">Mechanical</h2>
                </div>
                <div id="mechanical-items" class="space-y-3"></div>
            </section>

            <section>
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-2 h-6 bg-blue-500 rounded-full"></div>
                    <h2 class="text-xl font-bold uppercase tracking-tight">Interior</h2>
                </div>
                <div id="interior-items" class="space-y-3"></div>
            </section>

            <section>
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-2 h-6 bg-purple-500 rounded-full"></div>
                    <h2 class="text-xl font-bold uppercase tracking-tight">Cosmetic</h2>
                </div>
                <div id="cosmetic-items" class="space-y-3"></div>
            </section>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEoA7ZG9oineUWv18rMQbK_aR89TotLiHSQC3fcq5e_ljWsY3mF7XeeMCK_MFt92RL3A/exec";

        async function loadData() {
            setSyncStatus('loading', 'Fetching data...');
            try {
                const response = await fetch(SCRIPT_URL);
                const data = await response.json();
                renderDashboard(data);
                setSyncStatus('success', 'Live Sync Enabled');
            } catch (error) {
                console.error("Fetch error:", error);
                setSyncStatus('error', 'Sync Failed - Check Internet');
            }
        }

        function renderDashboard(data) {
            const containers = {
                'Engine': document.getElementById('engine-items'),
                'Mechanical': document.getElementById('mechanical-items'),
                'Interior': document.getElementById('interior-items'),
                'Cosmetic': document.getElementById('cosmetic-items')
            };

            // Clear old items
            Object.values(containers).forEach(c => c.innerHTML = '');

            let totalCost = 0;
            let totalItems = data.length;
            let checkedItems = 0;

            data.forEach(item => {
                totalCost += item.price;
                if (item.status === true || item.status === "TRUE") checkedItems++;

                const card = document.createElement('div');
                card.className = `card p-3 flex items-center justify-between transition-opacity ${item.status ? 'bg-slate-800/30' : ''}`;
                card.innerHTML = `
                    <div class="flex items-center gap-3">
                        <input type="checkbox" class="checkbox-custom" 
                            ${(item.status === true || item.status === "TRUE") ? 'checked' : ''} 
                            onchange="updateItemStatus(${item.id}, this.checked)">
                        <div>
                            <div class="flex items-center gap-2">
                                <span class="font-semibold text-sm ${item.status ? 'strikethrough' : ''}">${item.item}</span>
                                ${[1, 9].includes(item.id) ? '<span class="badge-critical">CRITICAL</span>' : ''}
                            </div>
                            <div class="text-[10px] text-slate-500 uppercase tracking-wider font-mono mt-0.5">
                                $${item.price.toFixed(2)} • <a href="${item.link}" target="_blank" class="text-blue-400 hover:text-blue-300">View Part</a>
                            </div>
                        </div>
                    </div>
                `;
                
                if (containers[item.category]) {
                    containers[item.category].appendChild(card);
                }
            });

            // Update Progress UI
            document.getElementById('total-budget').innerText = `$${totalCost.toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            const percent = (checkedItems / totalItems) * 100;
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('progress-percent').innerText = Math.round(percent) + '%';
        }

        async function updateItemStatus(id, isChecked) {
            setSyncStatus('loading', 'Saving change...');
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ id: id, status: isChecked })
                });
                setSyncStatus('success', 'Changes Saved');
                setTimeout(() => setSyncStatus('success', 'Live Sync Enabled'), 2000);
            } catch (error) {
                setSyncStatus('error', 'Failed to Save');
            }
        }

        function setSyncStatus(type, message) {
            const el = document.getElementById('sync-status');
            const dot = el.querySelector('span');
            el.innerHTML = `<span class="w-2 h-2 rounded-full"></span> ${message}`;
            const newDot = el.querySelector('span');
            
            if (type === 'loading') newDot.classList.add('bg-yellow-500', 'animate-pulse');
            else if (type === 'error') newDot.classList.add('bg-red-500');
            else newDot.classList.add('bg-green-500');
        }

        loadData();
    </script>
</body>
</html>
