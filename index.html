<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Del Sol Build Tracker</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent-green: #2ecc71;
            --accent-yellow: #f1c40f;
            --danger-red: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Header & Progress Bar */
        header {
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
        }

        .progress-container {
            background-color: #333;
            border-radius: 10px;
            height: 12px;
            width: 100%;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--accent-green);
            width: 0%;
            transition: width 0.5s ease-in-out;
        }

        .progress-stats {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: bold;
        }

        /* Card Layout */
        .parts-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            border-left: 4px solid transparent;
        }

        .card.purchased {
            border-left-color: var(--accent-green);
        }

        .card.pending {
            border-left-color: var(--accent-yellow);
        }

        .card-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .item-name {
            font-size: 16px;
            font-weight: 600;
        }

        .item-store {
            font-size: 12px;
            color: var(--text-muted);
        }

        .card-price-status {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
        }

        .item-price {
            font-size: 16px;
            font-weight: bold;
            color: var(--text-main);
        }

        .status-badge {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 12px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .status-purchased {
            background-color: rgba(46, 204, 113, 0.2);
            color: var(--accent-green);
        }

        .status-pending {
            background-color: rgba(241, 196, 15, 0.2);
            color: var(--accent-yellow);
        }
    </style>
</head>
<body>

    <header>
        <h1>D15B7 REVIVAL</h1>
        <div class="subtitle">Stage 1: Reliability & Safety</div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-stats">
            <span id="spentText">$0.00 Spent</span>
            <span id="percentText">0% Complete</span>
        </div>
    </header>

    <div class="parts-list" id="partsContainer">
        </div>

    <script>
        // Your specific dashboard data
        const partsData = [
            { id: 1, item: "EverStart Maxx 51R Battery", price: 83.19, store: "Walmart", status: true },
            { id: 26, item: "185/60/R15 Tires (Rear)", price: 80.03, store: "Thompson Tires", status: true },
            { id: 2, item: "Autolite Platinum Spark Plugs", price: 21.02, store: "Advance Auto", status: true },
            { id: 3, item: "Negative Battery Cable", price: 18.95, store: "Advance Auto", status: true },
            { id: 4, item: "PB Blaster Penetrating Oil", price: 6.99, store: "Advance Auto", status: true },
            { id: 9, item: "Argos 5W-30 Oil & Filter", price: 22.00, store: "Advance Auto", status: true },
            { id: 5, item: "Intake Hose & Air Filter Kit", price: 33.59, store: "eBay", status: false },
            { id: 6, item: "Valve Cover Seal Kit", price: 13.68, store: "eBay", status: false },
            { id: 7, item: "Valve Cover Gasket", price: 15.74, store: "eBay", status: false }
        ];

        function renderDashboard() {
            const container = document.getElementById('partsContainer');
            let totalSpent = 0;
            let totalCost = 0;

            partsData.forEach(part => {
                totalCost += part.price;
                if (part.status) totalSpent += part.price;

                // Create Card element
                const card = document.createElement('div');
                card.className = `card ${part.status ? 'purchased' : 'pending'}`;
                
                card.innerHTML = `
                    <div class="card-info">
                        <div class="item-name">${part.item}</div>
                        <div class="item-store">${part.store}</div>
                    </div>
                    <div class="card-price-status">
                        <div class="item-price">$${part.price.toFixed(2)}</div>
                        <div class="status-badge ${part.status ? 'status-purchased' : 'status-pending'}">
                            ${part.status ? 'Purchased' : 'Pending'}
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            // Update Progress Bar Math
            const percentComplete = Math.round((totalSpent / totalCost) * 100);
            document.getElementById('progressBar').style.width = `${percentComplete}%`;
            document.getElementById('percentText').innerText = `${percentComplete}% Complete`;
            document.getElementById('spentText').innerText = `$${totalSpent.toFixed(2)} Spent`;
        }

        // Initialize App
        renderDashboard();
    </script>

</body>
</html>
